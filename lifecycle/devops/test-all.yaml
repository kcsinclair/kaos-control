name: Test Runner for Everything
type: test

# Invoke the test-runner agent via the kaos-control API. The agent runs all
# configured test suites (Go, Vitest, Playwright), parses failures, and
# auto-files defect artifacts in lifecycle/defects/ for each failure found.
#
# Prerequisites:
#   KC_PORT    — kaos-control HTTP port (default: 8042)
#   KC_PROJECT — project ID registered in kaos-control
#   KC_API_TOKEN — dynamic token, lives for job.

steps:
  - name: Run test-runner agent
    command: |
      curl -s -X POST "http://127.0.0.1:${KC_PORT}/api/p/${KC_PROJECT}/agents/test-runner/run" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${KC_API_TOKEN}" \
        -d '{}'
    timeout: 30m
