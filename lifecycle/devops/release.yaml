name: Release kaos-control
type: release

steps:
  - name: Build frontend
    description: Install pnpm dependencies and build the Vue SPA into web/dist
    command: cd web && pnpm install && pnpm run build
    timeout: 5m

  - name: Build all platforms
    description: Static (CGO_ENABLED=0) binaries for linux, darwin, windows × amd64/arm64
    command: make release VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
    timeout: 15m

  - name: List artifacts
    description: Show the produced binaries with sizes
    command: ls -lah dist/kaos-control-*
    timeout: 30s
