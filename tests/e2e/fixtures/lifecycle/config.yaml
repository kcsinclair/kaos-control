git:
  default_branch: main
  branch_template: "requirement/{slug}"
roles:
  - product-owner
  - analyst
  - backend-developer
  - frontend-developer
  - test-developer
  - qa
  - tech-writer
stages:
  - name: ideas
    dir: ideas
  - name: requirements
    dir: requirements
  - name: defects
    dir: defects
  - name: releases
    dir: releases
  - name: docs
    dir: docs
required_plans:
  requirement:
    - plan-backend
    - plan-frontend
    - plan-test
users:
  - email: admin@kaos-e2e.local
    roles:
      - product-owner
      - analyst
  - email: techwriter@kaos-e2e.local
    roles:
      - tech-writer
dashboard:
  tracked_types:
    - idea
    - requirement
    - defect
    - doc
agents:
  - name: stub-agent
    role:
      - product-owner
    driver: shell-stub
    shell_command: "sleep 1 && printf '{\"type\":\"result\",\"subtype\":\"success\",\"is_error\":false}\\n'"
    git_identity:
      name: Stub Agent
      email: stub@kaos-e2e.local
    allowed_write_paths: []
    prompt_templates:
      product-owner: "Process {target_path}"
  - name: tech-writer
    roles:
      - tech-writer
    driver: shell-stub
    shell_command: "sleep 1 && printf '{\"type\":\"result\",\"subtype\":\"success\",\"is_error\":false}\\n'"
    git_identity:
      name: Tech Writer Agent
      email: techwriter-agent@kaos-e2e.local
    allowed_write_paths:
      - lifecycle/docs
